<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hotel Booking Premium</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

/* BUTTON */
button {
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

/* PAGE */
.page { display: none; padding: 20px; }
.active { display: block; }

/* BANNER */
.banner {
    height: 350px;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945');
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card-container {
    display: flex;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    width: 230px;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-10px);
}

/* ROOM */
.room {
    background: #334155;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>
<body>

<nav>
    <h2>HotelKu Premium</h2>
    <div>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('hotel')">Hotel</button>
        <button onclick="showPage('login')">Login</button>
        <button onclick="showPage('admin')">Admin</button>
    </div>
</nav>

<!-- HOME -->
<section id="home" class="page active">
    <div class="banner">
        <h1>Booking Hotel Impianmu</h1>
        <input type="text" id="search" placeholder="Cari hotel...">
        <button onclick="searchHotel()">Cari</button>
    </div>

    <h2>Hotel Populer</h2>
    <div id="hotelList" class="card-container"></div>
</section>

<!-- HOTEL -->
<section id="hotel" class="page">
    <h2>Daftar Hotel</h2>
    <div id="allHotels" class="card-container"></div>
</section>

<!-- DETAIL -->
<section id="detail" class="page">
    <h2>Detail Hotel</h2>
    <div id="detailHotel"></div>

    <h3>Pilih Kamar</h3>
    <div id="roomList"></div>
</section>

<!-- BOOKING -->
<section id="booking" class="page">
    <h2>Booking</h2>
    <input type="text" id="nama" placeholder="Nama">
    <input type="date" id="checkin">
    <input type="date" id="checkout">
    <input type="number" id="tamu" placeholder="Jumlah tamu">

    <select id="tipeKamar">
        <option>Standard</option>
        <option>Deluxe</option>
        <option>Suite</option>
    </select>

    <button onclick="booking()">Booking</button>
</section>

<!-- LOGIN -->
<section id="login" class="page">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</section>

<!-- ADMIN -->
<section id="admin" class="page">
    <h2>Dashboard Admin</h2>

    <input type="text" id="namaHotel" placeholder="Nama Hotel">
    <input type="text" id="lokasiHotel" placeholder="Lokasi">
    <button onclick="tambahHotel()">Tambah Hotel</button>

    <h3>Tambah Kamar</h3>
    <input type="text" id="roomHotelId" placeholder="ID Hotel">
    <input type="text" id="tipe" placeholder="Tipe (Standard/Deluxe)">
    <input type="number" id="harga" placeholder="Harga">
    <button onclick="tambahKamar()">Tambah Kamar</button>

    <h3>Booking</h3>
    <div id="dataBooking"></div>
</section>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyAtN1GIGQ-Agoqupcad2lx4HizdXOI0aSw",
    authDomain: "PROJECT.firebaseapp.com",
    projectId: "PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// HOTEL
function loadHotel(){
    db.collection("hotel").get().then(snap=>{
        let html="";
        snap.forEach(doc=>{
            let d=doc.data();
            html+=`
            <div class="card">
                <h3>${d.nama}</h3>
                <p>${d.lokasi}</p>
                <button onclick="detail('${doc.id}')">Lihat</button>
            </div>`;
        });
        hotelList.innerHTML=html;
        allHotels.innerHTML=html;
    });
}

// DETAIL + ROOM
function detail(id){
    db.collection("hotel").doc(id).get().then(doc=>{
        let d=doc.data();
        detailHotel.innerHTML=`<h3>${d.nama}</h3><p>${d.lokasi}</p>`;
        loadRoom(id);
        showPage('detail');
    });
}

// ROOM
function loadRoom(hotelId){
    db.collection("room").where("hotelId","==",hotelId).get().then(snap=>{
        let html="";
        snap.forEach(doc=>{
            let d=doc.data();
            html+=`
            <div class="room">
                <h4>${d.tipe}</h4>
                <p>Rp ${d.harga}</p>
                <button onclick="showPage('booking')">Pilih</button>
            </div>`;
        });
        roomList.innerHTML=html;
    });
}

// BOOKING
function booking(){
    db.collection("booking").add({
        nama:nama.value,
        checkin:checkin.value,
        tipe:tipeKamar.value
    });
    alert("Berhasil booking!");
}

// ADMIN
function tambahHotel(){
    db.collection("hotel").add({
        nama:namaHotel.value,
        lokasi:lokasiHotel.value
    });
    loadHotel();
}

function tambahKamar(){
    db.collection("room").add({
        hotelId:roomHotelId.value,
        tipe:tipe.value,
        harga:harga.value
    });
}

// LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>showPage('admin'));
}

function register(){
    auth.createUserWithEmailAndPassword(email.value,password.value);
}

// BOOKING ADMIN
function loadBooking(){
    db.collection("booking").get().then(snap=>{
        let html="";
        snap.forEach(doc=>{
            let d=doc.data();
            html+=`<p>${d.nama} - ${d.tipe}</p>`;
        });
        dataBooking.innerHTML=html;
    });
}

// SEARCH
function searchHotel(){
    let k=search.value.toLowerCase();
    db.collection("hotel").get().then(snap=>{
        let html="";
        snap.forEach(doc=>{
            let d=doc.data();
            if(d.nama.toLowerCase().includes(k)){
                html+=`<div class="card"><h3>${d.nama}</h3></div>`;
            }
        });
        hotelList.innerHTML=html;
    });
}

loadHotel();
loadBooking();

</script>

</body>
</html>
